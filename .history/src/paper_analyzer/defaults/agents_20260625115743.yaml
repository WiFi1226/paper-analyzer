# ── Agent 注册表 ────────────────────────────────────────────────
# order 值决定报告中的区段排序，数字越小越靠前。
# 按 category 分组分配区间：
#   paper_structure:        0-4   （预留 2 个插槽）
#   empirical_methodology:  5-9   （预留 2 个插槽）
#   results_reporting:     10-14  （预留 3 个插槽）
# 区间内留空为将来新增 agent 预留，避免打乱现有排序。

agents:
  preliminary-info-analyzer:
    section_label: "前置信息"
    order: 0
    category: "paper_structure"
    description: "期刊、作者、摘要、关键词、目录结构分析"
    needs_chapter_list: true
  introduction-analyzer:
    section_label: "引言分析"
    order: 1
    category: "paper_structure"
    description: "研究背景、研究缺口、研究问题、边际贡献"
  literature-review-analyzer:
    section_label: "文献综述分析"
    order: 2
    category: "paper_structure"
    description: "文献脉络、已有成果、文献缺口"
  causal-inference-analyzer:
    section_label: "因果推断分析"
    order: 5
    category: "empirical_methodology"
    description: "数据来源、变量构建、回归模型、识别策略、稳健性检验"
  descriptive-measurement-analyzer:
    section_label: "描述性测量分析"
    order: 6
    category: "empirical_methodology"
    description: "数据编制规则、指标体系、核算逻辑、交叉验证"
  structural-estimation-analyzer:
    section_label: "结构估计分析"
    order: 8
    category: "empirical_methodology"
    description: "理论模型设定、参数估计、模型拟合、反事实实验"
  evidence-synthesis-analyzer:
    section_label: "证据综合分析"
    order: 7
    category: "empirical_methodology"
    description: "文献检索筛选、效应量编码、合并模型、发表偏倚"
  chart-results-analyzer:
    section_label: "图表结果分析"
    order: 10
    category: "results_reporting"
    description: "图表/表格的变量定义、数据来源、结果解读"
  text-results-analyzer:
    section_label: "文本结果分析"
    order: 11
    category: "results_reporting"
    description: "文字叙述的关键发现、效应量与方向、统计报告"
