# Agent 别名：路由器 → 子 agent 展开列表
aliases:
  paper-structure-analyzer:
    - preliminary-info-analyzer
    - introduction-analyzer
    - literature-review-analyzer
  empirical-methodology-analyzer:
    - causal-inference-analyzer
    - descriptive-measurement-analyzer
    - structural-estimation-analyzer
    - evidence-synthesis-analyzer
  results-reporting-analyzer:
    - chart-results-analyzer
    - text-results-analyzer

# 路由表：关键词 → Agent 映射
routes:
  # ── 论文结构分析 ──
  - agent: preliminary-info-analyzer
    keywords: [前置信息]
  - agent: introduction-analyzer
    keywords: [引言, Introduction]
  - agent: literature-review-analyzer
    keywords: [文献综述, Literature, Related Work]
  # ── 实证方法分析 ──
  - agent: causal-inference-analyzer
    keywords:
      [内生性, Endogeneity, 机制, Mechanism,
       异质性, Heterogeneity, 稳健性, Robustness]
  - agent: descriptive-measurement-analyzer
    keywords: [编制, 核算]
  - agent: structural-estimation-analyzer
    keywords:
      [模型, Model, 参数, Parameter, 校准, Calibration,
       反事实, Counterfactual, 模拟, Simulation,
       Aggregate effect, banking panic, quantify, Quantify]
  - agent: evidence-synthesis-analyzer
    keywords:
      [元分析, Meta, 效应量, Effect size, 发表偏倚, Publication bias,
       文献计量, Bibliometric, 系统综述, Systematic review]
  # ── 结果汇报分析 ──
  - agent: chart-results-analyzer
    keywords: [图表, Figure, Fig, Table, 图示, 绘制]
  - agent: text-results-analyzer
    keywords: [结果, Results, 发现, Findings, 讨论, Discussion, 结论, Conclusion]
