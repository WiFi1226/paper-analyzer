[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "paper-analyzer-core"
version = "0.1.0"
description = "论文分析工具包：PDF 提取、章节切分、Agent 路由、Prompt 构造、报告组装"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Fan Wang", },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Text Processing",
]
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
tui = ["prompt-toolkit>=3.0", "wcwidth>=0.2.0"]
dev = ["pytest>=7.0"]

[project.urls]
Homepage = "https://github.com/user/paper-analyzer"
Repository = "https://github.com/user/paper-analyzer"

[project.scripts]
paper-extract = "paper_analyzer.cli.extract:main"
paper-split = "paper_analyzer.cli.split:main"
paper-route = "paper_analyzer.cli.route:main"
paper-orchestrate = "paper_analyzer.cli.orchestrate:main"
paper-invoke = "paper_analyzer.cli.invoke:main"
paper-save-output = "paper_analyzer.cli.save_output:main"
paper-assemble = "paper_analyzer.cli.assemble:main"
paper-routing = "paper_analyzer.cli.interactive_routing:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
paper_analyzer = ["defaults/*.yaml"]


